<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#071411">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ademritme">
    <title>Ademritme</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" href="icons/icon-192.png">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="hero" aria-labelledby="app-title">
        <div>
          <p class="time-label" id="today-label">Persoonlijk ritme</p>
          <h1 id="app-title">Ademritme</h1>
        </div>
        <p class="ratio">5,20s in · 6,35s uit</p>
      </section>

      <section class="duration-panel" aria-label="Kies sessieduur">
        <button class="duration-card" type="button" data-duration="5">
          <span>5</span>
          <small>minuten</small>
        </button>
        <button class="duration-card selected" type="button" data-duration="8" aria-pressed="true">
          <span>8</span>
          <small>minuten</small>
        </button>
        <button class="duration-card" type="button" data-duration="12">
          <span>12</span>
          <small>minuten</small>
        </button>
      </section>

      <section class="player" aria-label="Ademspeler">
        <div class="breath-orb" aria-hidden="true">
          <svg viewBox="0 0 220 220" role="img">
            <defs>
              <linearGradient id="ring-gradient" x1="38" y1="34" x2="182" y2="186">
                <stop offset="0%" stop-color="#c8f6da"></stop>
                <stop offset="48%" stop-color="#65d0bd"></stop>
                <stop offset="100%" stop-color="#86a8ff"></stop>
              </linearGradient>
            </defs>
            <circle class="ring-track" cx="110" cy="110" r="92"></circle>
            <circle class="ring-progress" cx="110" cy="110" r="92"></circle>
          </svg>
          <div class="breath-copy">
            <span id="phase-label">Klaar</span>
            <strong id="phase-time">5,20</strong>
            <small id="phase-unit">seconden</small>
          </div>
        </div>

        <button class="play-button" id="play-button" type="button" aria-label="Start sessie">
          <span class="play-icon" aria-hidden="true"></span>
          <span id="play-label">Start</span>
        </button>

        <div class="timeline" aria-label="Voortgang">
          <div class="timeline-meta">
            <span id="elapsed-time">0:00</span>
            <span id="remaining-time">-8:00</span>
          </div>
          <input id="seek" type="range" min="0" max="480" value="0" step="0.1" aria-label="Spoel sessie">
        </div>
      </section>

      <section class="status-panel" aria-live="polite">
        <div>
          <strong id="session-title">8 minuten</strong>
          <span id="session-detail">Rustige begeleide ademhaling</span>
        </div>
        <span class="status-dot" id="status-dot">offline-ready</span>
      </section>

      <audio id="audio" preload="auto" src="audio/hrv-breath-8min.mp3"></audio>
    </main>
    <script src="app.js" type="module"></script>
  </body>
</html>
